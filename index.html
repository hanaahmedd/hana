<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
background:#0b0b1a;
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}


/* START SCREEN */
#start-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
z-index:100;
transition:opacity 1s;
}


#start-btn{
padding:15px 40px;
font-size:1.5rem;
font-weight:bold;
color:white;
background:#ff4081;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 4px 15px rgba(255,64,129,.4);
animation:bounce 2s infinite;
}


@keyframes bounce{
0%,20%,50%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-20px)}
60%{transform:translateY(-10px)}
}



/* MAIN */

#main-content{
display:none;
width:100%;
height:100%;
position:absolute;
justify-content:center;
align-items:center;
z-index:10;
}


#final-surprise{

opacity:0;
transform:scale(.5) translateY(50px);
transition:1.5s;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}


#final-surprise.visible{
opacity:1;
transform:scale(1) translateY(0);
}



/* CAKE */

.css-cake{
position:relative;
width:250px;
height:220px;
animation:float 3s infinite;
}


.plate{
position:absolute;
bottom:0;
left:-25px;
width:300px;
height:60px;
background:#ddd;
border-radius:50%;
}


.bottom-layer{
position:absolute;
bottom:30px;
left:25px;
width:200px;
height:80px;
background:#ff758c;
border-radius:10px 10px 0 0;
}



.top-layer{
position:absolute;
bottom:110px;
left:50px;
width:150px;
height:60px;
background:#ff7eb3;
border-radius:10px 10px 0 0;
}



.candle{
position:absolute;
bottom:170px;
left:115px;
width:20px;
height:50px;

background:repeating-linear-gradient(
45deg,
#ff4081 5px,
#ff4081 10px
);

}


.flame{
position:absolute;
top:-30px;
width:16px;
height:28px;
background:#ffeb3b;
border-radius:50%;
box-shadow:0 0 20px #ff9800;
animation:flicker .6s infinite alternate;
}



@keyframes flicker{

from{transform:scale(1)}

to{transform:scale(1.2)}

}


@keyframes float{

50%{transform:translateY(-15px)}

}



/* TEXT */

#bday-wish{

background:linear-gradient(45deg,#ff00cc,#ffeb3b);

-webkit-background-clip:text;
background-clip:text;

-webkit-text-fill-color:transparent;
color:transparent;

}


#bday-message{

font-family:'Pacifico';
font-size:2rem;
color:#ff7eb3;

}



/* FIREWORKS */

#fireworks{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;

}


</style>

</head>


<body>


<div id="start-screen">

<button id="start-btn">
click the button
</button>

</div>



<canvas id="fireworks"></canvas>



<audio id="bday-song" loop>

<source src="birthday.mp3" type="audio/mpeg">

</audio>



<div id="main-content">


<div id="final-surprise">


<div class="css-cake">

<div class="plate"></div>

<div class="bottom-layer"></div>

<div class="top-layer"></div>


<div class="candle">

<div class="flame"></div>

</div>


</div>



<h1 id="bday-wish">
Happy Birthday! shahd 🎉 Make a Wish!
</h1>


<p id="bday-message">
اتمني دايما نفضل صحاب و تحققي كل اللي بتتمنيه
</p>


</div>


</div>




<script>


const btn=document.getElementById("start-btn");
const start=document.getElementById("start-screen");
const main=document.getElementById("main-content");
const surprise=document.getElementById("final-surprise");
const song=document.getElementById("bday-song");


btn.onclick=()=>{


song.play();


start.style.opacity=0;


setTimeout(()=>{

start.style.display="none";

main.style.display="flex";

surprise.classList.add("visible");

startFireworks();


},1000);



};





const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");


canvas.width=innerWidth;
canvas.height=innerHeight;


window.onresize=()=>{

canvas.width=innerWidth;
canvas.height=innerHeight;

}



let particles=[];


function random(a,b){

return Math.random()*(b-a)+a;

}



class Particle{


constructor(x,y){

this.x=x;
this.y=y;

this.speed=random(2,8);

this.angle=random(0,Math.PI*2);

this.vx=Math.cos(this.angle)*this.speed;

this.vy=Math.sin(this.angle)*this.speed;

this.alpha=1;

}


update(){

this.vx*=.95;
this.vy*=.95;

this.vy+=.1;

this.x+=this.vx;
this.y+=this.vy;

this.alpha-=.02;


}


draw(){

ctx.globalAlpha=this.alpha;

ctx.beginPath();

ctx.arc(this.x,this.y,3,0,Math.PI*2);

ctx.fillStyle=
`hsl(${random(0,360)},100%,50%)`;

ctx.fill();


ctx.globalAlpha=1;

}


}



function explode(){


let x=random(100,innerWidth-100);

let y=random(100,innerHeight/2);


for(let i=0;i<70;i++){

particles.push(new Particle(x,y));

}


}




function startFireworks(){


function loop(){


ctx.fillStyle="rgba(11,11,26,.2)";

ctx.fillRect(0,0,canvas.width,canvas.height);



if(Math.random()<.05)
explode();



particles.forEach((p,i)=>{

p.update();

p.draw();


if(p.alpha<=0)
particles.splice(i,1);


});



requestAnimationFrame(loop);



}


loop();


}



</script>
</body>
</html>
